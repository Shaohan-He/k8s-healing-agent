# K8s Healing Agent — Prometheus 告警规则
# 触发 Agent 自愈流程的告警定义
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: k8s-healing-agent-rules
  namespace: healing-agent
spec:
  groups:
    - name: pod-faults
      rules:
        - alert: KubePodOOMKilled
          expr: kube_pod_container_status_terminated_reason{reason="OOMKilled"} > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} OOMKilled"
            description: "容器 {{ $labels.container }} 因内存不足被杀死"

        - alert: KubePodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} CrashLooping"

        - alert: KubeImagePullBackOff
          expr: kube_pod_container_status_waiting_reason{reason="ImagePullBackOff"} > 0
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 镜像拉取失败"

        - alert: KubePodPending
          expr: kube_pod_status_phase{phase="Pending"} > 0
          for: 5m
          labels:
            severity: info
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 长时间 Pending"
